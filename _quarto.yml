project:
  type: website
  render:
    - index.qmd
    - about.qmd
    - "src/**/*.qmd"

lang: zh

website:
  title: "Rong's Notes"
  draft-mode: gone
  navbar:
    left:
      - href: index.qmd
        text: 首页
      - href: src/learn/index.qmd
        text: 学习笔记
      - href: about.qmd
        text: 关于
  sidebar:
    - id: learn
      title: "学习笔记"
      style: docked
      contents:
        - href: src/learn/index.qmd
          text: 学习笔记总览
        - href: src/learn/advanced-probability/index.qmd
          text: 高等概率论

format:
  html:
    theme:
      - journal
      # - cosmo
      # - quartz
      # - brand
    css: styles.css
    toc: true
    toc-location: right
    toc-title: "目录"
    include-after-body:
      - scripts/proof-collapse.html
      - scripts/math-env-fix.html

crossref:
  title-delim: " "
  thm-title: "定理"
  lem-title: "引理"
  cor-title: "推论"
  prp-title: "命题"
  cnj-title: "猜想"
  def-title: "定义"
  exm-title: "例"
  exr-title: "习题"
