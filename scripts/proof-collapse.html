<script>
(function () {
  function makeProofsCollapsible() {
    const proofs = document.querySelectorAll("div.proof");

    proofs.forEach(function (proof) {
      if (proof.dataset.collapsibleReady === "true") return;

      const details = document.createElement("details");

      details.className = proof.className;
      details.classList.add("proof-collapsible");
      details.dataset.collapsibleReady = "true";

      if (proof.id) {
        details.id = proof.id;
      }

      details.open = proof.classList.contains("open");

      const summary = document.createElement("summary");
      const title = proof.querySelector(".proof-title");

      if (title) {
        summary.innerHTML = title.innerHTML;
        title.remove();
      } else {
        summary.innerHTML = "<strong>Proof</strong>";
      }

      details.appendChild(summary);

      while (proof.firstChild) {
        details.appendChild(proof.firstChild);
      }

      proof.replaceWith(details);
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", makeProofsCollapsible);
  } else {
    makeProofsCollapsible();
  }
})();
</script>
